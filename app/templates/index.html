<script>
  document.addEventListener('DOMContentLoaded', function(){
    const modal = new bootstrap.Modal(document.getElementById('modal'))
    let pendingBtn = null;

    document.body.addEventListener('htmx:beforeRequest', function(e){
      const el = e.detail.elt;
      const target = el.getAttribute('hx-target');
      const isGet = el.hasAttribute('hx-get');
      if (target === '#dialog' && isGet) {
        pendingBtn = el;
        el.classList.add('disabled');
        el.style.pointerEvents = 'none';
        document.getElementById('dialog').innerHTML =
          '<div class="modal-content"><div class="modal-body text-center py-5">' +
          '<div class="spinner-border text-primary" role="status"></div>' +
          '<p class="mt-3">Loading...</p></div></div>';
        modal.show();
      }
    });

    document.body.addEventListener('htmx:afterSwap', function(e){
      if (e.detail.target.id === "dialog") {
        if (pendingBtn) {
          pendingBtn.classList.remove('disabled');
          pendingBtn.style.pointerEvents = '';
          pendingBtn = null;
        }
        modal.show();
      }
    });

    document.body.addEventListener('htmx:afterOnLoad', function(e){
      if (e.detail.target && e.detail.target.id === "dialog" && e.detail.xhr.status === 200) {
        var resp = e.detail.xhr.responseText;
        if (resp.indexOf('save-success') !== -1) {
          modal.hide();
          document.getElementById('dialog').innerHTML = '';
          window.location.href = window.location.href;
        }
      }
    });
  });

  function ValidateSelection()  
  {  
      
      var Selected = false;
      
      if (document.getElementById("SelectAll").checked)
      {
        Selected = true;
      }       
      else
      {        
        Selected = false;
      }
        
     
      
      var checkboxes = document.getElementsByName("empSelected");
      for(var i = 0; i < checkboxes.length; i++)  
      { 
        checkboxes[i].checked = Selected;
      }  
      
      ValidateEmpSelection();  
  }  

  function ValidateEmpSelection()  
  {  
      var checkboxes = document.getElementsByName("empSelected");  
      var emplist = document.getElementsByName("Employees"); 
      var lista = "";
      var numberOfCheckedItems = 0;  
      for(var i = 0; i < checkboxes.length; i++)  
      {  
          if(checkboxes[i].checked)  
           {
              if (numberOfCheckedItems == 0)
                lista =  checkboxes[i].value;
              else
                lista = lista + "," + checkboxes[i].value;

              numberOfCheckedItems++;  
           } 
              
      }  


      if(numberOfCheckedItems > 0)  
      {  
        document.getElementById("Employees").value = lista;        
        document.getElementById("recap_btn").disabled = false;
      } 
      else
      {
        document.getElementById("Employees").value = 0
        document.getElementById("recap_btn").disabled = true;
      }
        

  }  

  $(document).ready(function () {
            $('#generate_recap').click(function () {
                $('.alert').show()
            })
        });

        
  
</script>
